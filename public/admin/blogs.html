<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Management | Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/quill/1.3.7/quill.snow.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar"></aside>

  <!-- Main Content -->
  <div class="admin-layout">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-title">
        <h1>Blogs Management</h1>
      </div>
      <div class="header-user">
        <i class="fas fa-user-circle"></i>
        <span id="admin-user-display">Admin</span>
      </div>
    </header>

    <!-- Container -->
    <main class="admin-container">
      <div class="data-card">
        <div class="card-header">
          <h2>All Blog Posts</h2>
          <div class="card-actions">
            <div class="search-box">
              <i class="fas fa-search"></i>
              <input type="text" id="search-blogs" placeholder="Search blogs...">
            </div>
            <button class="btn-admin btn-admin-primary" id="btn-add-blog">
              <i class="fas fa-plus"></i> Create Post
            </button>
          </div>
        </div>

        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th style="width: 100px;">Featured</th>
                <th>Post Title</th>
                <th>Category</th>
                <th style="width: 150px;">Status</th>
                <th style="width: 120px;">Actions</th>
              </tr>
            </thead>
            <tbody id="blogs-table-body">
              <tr>
                <td colspan="5" class="text-center">Loading blogs...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add/Edit Blog Modal -->
  <div class="admin-modal" id="blog-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="blog-modal-title">Create Blog Post</h3>
        <button class="modal-close"><i class="fas fa-times"></i></button>
      </div>
      
      <form id="blog-form" enctype="multipart/form-data">
        <div class="modal-body">
          <div class="admin-form-group">
            <label for="blog-title">Post Title *</label>
            <input type="text" class="admin-form-control" id="blog-title" name="title" required placeholder="e.g. 5 Trends in Contemporary Living Rooms">
          </div>

          <div class="admin-form-row">
            <div class="admin-form-group">
              <label for="blog-category">Category *</label>
              <select class="admin-form-control" id="blog-category" name="category" required>
                <!-- Populated dynamically -->
              </select>
            </div>
            <div class="admin-form-group">
              <label for="blog-status">Status</label>
              <select class="admin-form-control" id="blog-status" name="status">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
          </div>

          <div class="admin-form-group">
            <label for="blog-content-editor">Post Content *</label>
            <div id="blog-content-editor" style="height: 250px; background: #fff; font-family: inherit;"></div>
            <input type="hidden" id="blog-content" name="content" required>
          </div>

          <div class="admin-form-group">
            <label for="blog-featuredImage">Blog Gallery (Select Upto 3 Images) *</label>
            <input type="file" class="admin-form-control" id="blog-featuredImage" name="images" accept="image/png, image/jpeg, image/jpg, image/webp" multiple>
            <div class="image-upload-preview" id="blog-image-preview" style="display: flex; gap: 10px; flex-wrap: wrap; width: 100% !important; height: auto !important; min-height: 100px; padding: 10px; align-items: center; justify-content: flex-start; background: #f9f9f9; border: 1px dashed var(--border); border-radius: 8px; overflow: visible !important;">
              <span class="placeholder">Gallery Previews</span>
            </div>
          </div>


        </div>

        <div class="modal-footer">
          <button type="button" class="btn-admin btn-admin-outline" id="btn-cancel-blog">Cancel</button>
          <button type="button" class="btn-admin btn-admin-outline" id="btn-preview-blog" style="border-color:var(--accent); color:var(--accent);"><i class="fas fa-eye"></i> Live Preview</button>
          <button type="submit" class="btn-admin btn-admin-primary">Publish Post</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quill@1.3.7/dist/quill.min.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
