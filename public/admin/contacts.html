<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Inquiries | Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>

<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar"></aside>

  <!-- Main Content -->
  <div class="admin-layout">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-title">
        <h1>Contact Form Inquiries</h1>
      </div>
      <div class="header-user">
        <i class="fas fa-user-circle"></i>
        <span id="admin-user-display">Admin</span>
      </div>
    </header>

    <!-- Container -->
    <main class="admin-container">
      <div class="data-card">
        <div class="card-header">
          <h2>Client Inquiries</h2>
        </div>

        <div class="admin-table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Contact Name</th>
                <th>Sender Details</th>
                <th>Inquiry Message</th>
                <th style="width: 150px;">Status</th>
                <th style="width: 80px;">Actions</th>
              </tr>
            </thead>
            <tbody id="contacts-table-body">
              <tr>
                <td colspan="5" class="text-center">Loading contact inquiries...</td>
              </tr>
            </tbody>
          </table>
        </div>
    </main>
  </div>

  <!-- View Inquiry Details Modal -->
  <div class="admin-modal" id="contact-details-modal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1050; align-items: center; justify-content: center;">
    <div class="modal-content"
      style="background: #fff; width: 100%; max-width: 600px; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: flex; flex-direction: column;">
      <div class="modal-header"
        style="padding: 20px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="font-size: 1.2rem; color: #111; margin: 0; font-weight: 600;"><i class="fas fa-envelope-open-text"
            style="color: var(--primary);"></i> Inquiry Details</h3>
        <button class="modal-close" id="close-contact-modal-btn"
          style="background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #888;"><i
            class="fas fa-times"></i></button>
      </div>
      <div class="modal-body" style="padding: 25px; overflow-y: auto; max-height: 70vh;">

        <!-- Contact Profile Panel -->
        <div
          style="background: #f9fafb; padding: 20px; border-radius: 8px; border: 1px solid #e5e7eb; margin-bottom: 20px;">
          <h4
            style="font-size: 0.95rem; font-weight: 600; color: #111; margin: 0 0 15px 0; border-bottom: 1px solid #eee; padding-bottom: 8px;">
            <i class="fas fa-info-circle"></i> Contact Information
          </h4>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
              <span
                style="font-size: 0.72rem; text-transform: uppercase; color: #6b7280; font-weight: 700; display: block; margin-bottom: 2px;">Sender
                Name</span>
              <strong id="modal-c-name" style="font-size: 0.95rem; color: #1f2937;">-</strong>
            </div>
            <div>
              <span
                style="font-size: 0.72rem; text-transform: uppercase; color: #6b7280; font-weight: 700; display: block; margin-bottom: 2px;">Subject</span>
              <span id="modal-c-subject" style="font-size: 0.95rem; color: #1f2937; font-weight: 600;">-</span>
            </div>
            <div>
              <span
                style="font-size: 0.72rem; text-transform: uppercase; color: #6b7280; font-weight: 700; display: block; margin-bottom: 2px;">Email
                Address</span>
              <span id="modal-c-email" style="font-size: 0.95rem; color: #1f2937;">-</span>
            </div>
            <div>
              <span
                style="font-size: 0.72rem; text-transform: uppercase; color: #6b7280; font-weight: 700; display: block; margin-bottom: 2px;">Phone
                Number</span>
              <span id="modal-c-phone" style="font-size: 0.95rem; color: #1f2937;">-</span>
            </div>
          </div>
        </div>

        <!-- Full Description Message -->
        <div style="margin-bottom: 20px;">
          <label
            style="font-size:0.85rem; font-weight:600; text-transform:uppercase; margin-bottom:5px; display:block; color: #333;">Full
            Message / Description</label>
          <div id="modal-c-message"
            style="line-height: 1.6; color: #444; background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #e5e7eb; font-size: 0.95rem; max-height: 150px; overflow-y: auto; white-space: pre-wrap;">
            -</div>
        </div>

        <!-- Admin Notes -->
        <div style="margin-bottom: 10px;">
          <label for="modal-c-notes"
            style="font-size:0.85rem; font-weight:600; text-transform:uppercase; margin-bottom:5px; display:block; color: #333;">Admin
            Follow-up Notes</label>
          <textarea id="modal-c-notes"
            style="width: 100%; height: 90px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 0.95rem; resize: vertical; box-sizing: border-box;"
            placeholder="Type follow-up notes, actions taken, or discussion details here..."></textarea>
        </div>
      </div>
      <div class="modal-footer"
        style="padding: 15px 25px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px;">
        <button type="button" class="btn-admin btn-admin-outline" id="close-contact-modal-btn2"
          style="padding:8px 16px; border-radius:4px; cursor:pointer; font-weight: 600;">Close</button>
        <button type="button" class="btn-admin btn-admin-primary" id="save-contact-notes-btn"
          style="padding:8px 16px; border-radius:4px; cursor:pointer; font-weight: 600;">Save Notes</button>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/js/admin.js"></script>
</body>

</html>
