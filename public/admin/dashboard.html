<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>

<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar"></aside>

  <!-- Main Content -->
  <div class="admin-layout">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-title">
        <h1>Dashboard Overview</h1>
      </div>
      <div class="header-user">
        <i class="fas fa-user-circle"></i>
        <span id="admin-user-display">Admin</span>
      </div>
    </header>

    <!-- Container -->
    <main class="admin-container">
      <!-- Widgets Grid -->
      <div class="dashboard-grid">
        <div class="widget-card" data-module="projects">
          <div class="widget-info">
            <h3>Total Projects</h3>
            <p id="stat-projectsCount">0</p>
          </div>
          <div class="widget-icon"><i class="fas fa-project-diagram"></i></div>
        </div>

        <div class="widget-card" data-module="services">
          <div class="widget-info">
            <h3>Total Services</h3>
            <p id="stat-servicesCount">0</p>
          </div>
          <div class="widget-icon"><i class="fas fa-concierge-bell"></i></div>
        </div>

        <div class="widget-card" data-module="blogs">
          <div class="widget-info">
            <h3>Blog Posts</h3>
            <p id="stat-blogsCount">0</p>
          </div>
          <div class="widget-icon"><i class="fas fa-blog"></i></div>
        </div>

        <div class="widget-card" data-module="testimonials">
          <div class="widget-info">
            <h3>Testimonials</h3>
            <p id="stat-testimonialsCount">0</p>
          </div>
          <div class="widget-icon"><i class="fas fa-comment-alt"></i></div>
        </div>

        <div class="widget-card" data-module="consultations">
          <div class="widget-info">
            <h3>Bookings</h3>
            <p id="stat-consultationsCount">0</p>
          </div>
          <div class="widget-icon"><i class="fas fa-calendar-check"></i></div>
        </div>

        <div class="widget-card" data-module="contacts">
          <div class="widget-info">
            <h3>Inquiries</h3>
            <p id="stat-contactsCount">0</p>
          </div>
          <div class="widget-icon"><i class="fas fa-envelope-open-text"></i></div>
        </div>
      </div>

      <!-- Business Reports Panel (Specific to Role Permissions) -->
      <div class="data-card reports-panel-card"
        style="padding: 24px; margin-top: 25px; margin-bottom: 25px; display: none;">
        <h2 style="margin-bottom:10px; font-size:1.15rem; font-weight:600;"><i class="fas fa-file-excel"
            style="color:#107c41; margin-right:8px;"></i> Business Reports & Lead Downloads</h2>
        <p style="color:var(--text-gray); font-size:0.9rem; margin-bottom:20px;">Download styled Excel spreadsheets
          containing customer leads and follow-up updates for offline reporting.</p>
        <div style="display:flex; gap:15px; flex-wrap:wrap;">
          <button id="download-bookings-report" class="btn-admin btn-admin-primary"
            style="display: none; padding: 10px 20px; font-weight:600; cursor:pointer;"><i class="fas fa-download"></i>
            Bookings Report (Excel)</button>
          <button id="download-inquiries-report" class="btn-admin btn-admin-primary"
            style="display: none; padding: 10px 20px; font-weight:600; cursor:pointer;"><i class="fas fa-download"></i>
            Inquiries Report (Excel)</button>
          <button id="download-services-report" class="btn-admin btn-admin-primary"
            style="display: none; padding: 10px 20px; font-weight:600; cursor:pointer;"><i class="fas fa-download"></i>
            Services Report (Excel)</button>
          <button id="download-projects-report" class="btn-admin btn-admin-primary"
            style="display: none; padding: 10px 20px; font-weight:600; cursor:pointer;"><i class="fas fa-download"></i>
            Projects Report (Excel)</button>
          <button id="download-blogs-report" class="btn-admin btn-admin-primary"
            style="display: none; padding: 10px 20px; font-weight:600; cursor:pointer;"><i class="fas fa-download"></i>
            Blogs Report (Excel)</button>
          <button id="download-testimonials-report" class="btn-admin btn-admin-primary"
            style="display: none; padding: 10px 20px; font-weight:600; cursor:pointer;"><i class="fas fa-download"></i>
            Testimonials Report (Excel)</button>
        </div>
      </div>

      <!-- Quick Tips and Info -->

        <h2 style="margin-bottom:15px; font-size:1.15rem; font-weight:600;">Welcome to K.DESIGNS & INTERIORS Admin Panel</h2>
        <p style="color:var(--text-gray); line-height:1.7; font-size:0.95rem;">
          This custom dashboard lets you control all aspects of your company website dynamically:
        </p>
        <ul style="color:var(--text-gray); line-height:1.8; font-size:0.95rem; margin-top:15px; padding-left:20px;">

          <li>Update services details so changes propagate instantly across landing panels.</li>

          <li>View, read, and delete customer consultation requests and WhatsApp click leads.</li>
          <li>Manage site settings including branding, maps, and SEO keywords dynamically.</li>
        </ul>
      </div> -->
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/js/admin.js"></script>
</body>

</html>
