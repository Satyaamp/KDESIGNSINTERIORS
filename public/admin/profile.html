<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar"></aside>

  <!-- Main Content -->
  <div class="admin-layout">
    <!-- Header -->
    <header class="admin-header">
      <div class="header-title">
        <h1>My Profile Settings</h1>
      </div>
      <div class="header-user">
        <i class="fas fa-user-circle"></i>
        <span id="admin-user-display">Admin</span>
      </div>
    </header>

    <!-- Container -->
    <main class="admin-container">
      <div class="admin-form-row">
        
        <!-- Profile Info Card -->
        <div class="data-card" style="flex: 1.5;">
          <div class="card-header">
            <h2>Personal Information</h2>
          </div>
          
          <form id="profile-info-form" enctype="multipart/form-data" style="padding: 24px;">
            <div style="display:flex; gap:30px; align-items:flex-start; flex-wrap:wrap; margin-bottom: 25px;">
              <!-- Photo Upload -->
              <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
                <div id="profile-avatar-box" style="width: 130px; height: 130px; border-radius: 50%; overflow:hidden; border:3px solid var(--border); background:#F3F4F6; display:flex; align-items:center; justify-content:center; position:relative;">
                  <span class="text-gray" id="avatar-placeholder" style="font-size:3rem;"><i class="fas fa-user"></i></span>
                </div>
                <input type="file" id="profilePicture" name="profilePicture" accept="image/png, image/jpeg, image/jpg, image/webp" style="display:none;">
                <button type="button" id="change-photo-btn" class="btn-admin btn-admin-outline" style="padding: 6px 12px; font-size:0.85rem;"><i class="fas fa-camera"></i> Change Photo</button>
              </div>

              <!-- Contact Inputs -->
              <div style="flex: 1; min-width: 250px;">
                <div class="admin-form-group">
                  <label for="profile-name">Display Name *</label>
                  <input type="text" class="admin-form-control" id="profile-name" name="name" required>
                </div>

                <div class="admin-form-row">
                  <div class="admin-form-group">
                    <label for="profile-email">Email Address *</label>
                    <input type="email" class="admin-form-control" id="profile-email" name="email" required>
                  </div>
                  <div class="admin-form-group">
                    <label for="profile-phone">Phone Number</label>
                    <input type="text" class="admin-form-control" id="profile-phone" name="phone">
                  </div>
                </div>
              </div>
            </div>

            <div style="display:flex; justify-content:flex-end; border-top: 1px solid var(--border); padding-top: 20px;">
              <button type="submit" class="btn-admin btn-admin-primary">Save Profile Info</button>
            </div>
          </form>
        </div>

        <!-- Security Card -->
        <div class="data-card" style="flex: 1;">
          <div class="card-header">
            <h2>Change Password</h2>
          </div>

          <form id="profile-password-form" style="padding: 24px;">
            <div class="admin-form-group">
              <label for="currentPassword">Current Password *</label>
              <input type="password" class="admin-form-control" id="currentPassword" required>
            </div>

            <div class="admin-form-group">
              <label for="newPassword">New Password *</label>
              <input type="password" class="admin-form-control" id="newPassword" required placeholder="At least 6 characters">
            </div>

            <div class="admin-form-group">
              <label for="confirmNewPassword">Confirm New Password *</label>
              <input type="password" class="admin-form-control" id="confirmNewPassword" required>
            </div>

            <div style="display:flex; justify-content:flex-end; border-top: 1px solid var(--border); padding-top: 20px; margin-top:30px;">
              <button type="submit" class="btn-admin btn-admin-primary">Update Password</button>
            </div>
          </form>
        </div>

      </div>
    </main>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
