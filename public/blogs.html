<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs & Articles | K.DESIGNS & INTERIORS</title>
  <meta name="description" content="Read design insights, home decor guidelines, space arrangement trends, and materials reviews on our blog.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Header -->
  <header></header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Our Design Journal</h1>
      <div class="breadcrumbs">
        <a href="/">Home</a> / <span>Blogs & Insights</span>
      </div>
    </div>
  </section>

  <!-- Blogs Grid Section -->
  <section class="section">
    <div class="container">
      <!-- Blog Category Filters loaded dynamically -->
      <div class="portfolio-filters" id="blog-filters" style="margin-bottom: 40px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
        <button class="filter-btn active" data-filter="all">All Articles</button>
      </div>

      <div class="blogs-grid" id="all-blogs-grid">
        <!-- Loaded dynamically by main.js -->
        <div class="text-center" style="grid-column: 1/-1;">Loading Blogs...</div>
      </div>

      <!-- Load More Button -->
      <div style="text-align: center; margin-top: 50px; display: none;" id="blogs-load-more-container">
        <button id="btn-blogs-load-more" class="btn btn-accent">Load More Articles <i class="fas fa-redo-alt" style="margin-left: 8px;"></i></button>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer></footer>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
