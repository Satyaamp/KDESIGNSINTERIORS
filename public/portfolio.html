<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Gallery | K.DESIGNS & INTERIORS</title>
  <meta name="description" content="View our portfolio of luxury villas, corporate offices, hotels, commercial showrooms, and landscape designs.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Header -->
  <header></header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Our Design Portfolio</h1>
      <div class="breadcrumbs">
        <a href="/">Home</a> / <span>Portfolio Gallery</span>
      </div>
    </div>
  </section>

  <!-- Portfolio Section -->
  <section class="section">
    <div class="container">
      <!-- Filters loaded dynamically -->
      <div class="portfolio-filters" id="portfolio-filters">
        <button class="filter-btn active" data-filter="all">All Projects</button>
      </div>

      <!-- Projects loaded dynamically -->
      <div class="portfolio-grid" id="portfolio-grid">
        <div class="text-center" style="grid-column: 1/-1;">Loading Portfolio Grid...</div>
      </div>

      <!-- Load More Button -->
      <div style="text-align: center; margin-top: 50px; display: none;" id="portfolio-load-more-container">
        <button id="btn-portfolio-load-more" class="btn btn-accent">Load More Projects <i class="fas fa-redo-alt" style="margin-left: 8px;"></i></button>
      </div>
    </div>
  </section>

  <!-- CTA Banner Section -->
  <section class="cta-section" style="background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1920');">
    <div class="container">
      <h2>Let's build your dream design project together</h2>
      <p>Schedule a layout consultation with our design principal and receive a curated quote custom-made for your space requirements.</p>
      <div class="cta-buttons">
        <a href="/consultation" class="btn btn-accent">Consult Our Architect</a>
        <a href="/contact" class="btn btn-secondary">Contact Desk</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer></footer>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
