<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Details | K.DESIGNS & INTERIORS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Header -->
  <header></header>

  <!-- Page Header -->
  <section class="page-header">
    <div class="container">
      <h1 class="project-title-placeholder">Project Details</h1>
      <div class="breadcrumbs">
        <a href="/">Home</a> / <a href="/portfolio">Portfolio</a> / <span class="project-title-placeholder">Details</span>
      </div>
    </div>
  </section>

  <!-- Project Details Content -->
  <section class="section">
    <div class="container">
      
      <!-- Meta Information Row -->
      <div class="project-meta-grid" id="project-meta-container">
        <!-- Loaded dynamically by main.js -->
      </div>

      <!-- Description -->
      <div class="project-description">
        <h2 id="project-title" style="font-size: 2.2rem; margin-bottom: 20px;">Project Title</h2>
        <span class="subtitle" id="project-cat" style="margin-bottom: 25px;">Category</span>
        <div id="project-description-body" style="color:var(--text-secondary); font-size:1.05rem; line-height: 1.8;">
          Loading project description...
        </div>
      </div>

      <!-- Gallery Grid -->
      <div class="project-gallery-grid" id="project-gallery">
        <!-- Loaded dynamically by main.js -->
      </div>

      <!-- Video Walkthrough Section -->
      <div class="floorplan-section" id="project-video-section" style="display:none; margin-bottom:60px;">
        <h3>Video Presentation</h3>
        <div id="video-embed-container">
          <!-- Loaded dynamically by main.js -->
        </div>
      </div>

      <!-- Floor Plans Section -->
      <div class="floorplan-section" id="project-floorplans-section" style="display:none; margin-bottom:60px;">
        <h3>Layout & Floor Plans</h3>
        <div class="floorplan-grid" id="floorplans-container">
          <!-- Loaded dynamically by main.js -->
        </div>
      </div>

      <!-- Client Review Section -->
      <div class="floorplan-section" id="project-testimonials-section" style="display:none;">
        <h3>Client Feedback</h3>
        <div class="testimonials-slider" style="margin-top: 30px;">
          <div class="testimonial-slide active" style="display:block;">
            <blockquote id="project-testimonial-text">"Testimonial review text..."</blockquote>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer></footer>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
